<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カスタム小役カウンター</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; user-select: none; -webkit-user-select: none; }
        h1 { font-size: 1.2rem; margin: 5px 0 15px 0; color: #aaaaaa; }
        .top-controls { width: 100%; max-width: 450px; display: flex; gap: 10px; margin-bottom: 15px; }
        .game-input-container { flex: 1; background-color: #222; padding: 10px 12px; border-radius: 8px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border: 1px solid #444; }
        .game-label { font-weight: bold; font-size: 0.9rem; color: #00ffcc; }
        .game-input { width: 100px; font-size: 1.2rem; font-weight: bold; text-align: right; padding: 4px; border-radius: 6px; border: 1px solid #555; background-color: #333; color: #fff; }
        .game-input::placeholder { color: #555; }
        .btn-reset { padding: 0 15px; font-size: 0.9rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background-color: #555555; color: #ffffff; }
        .section-header { width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-title { font-size: 1rem; font-weight: bold; color: #ddd; margin: 0; }
        .btn-toggle-all { background-color: #3a3a3a; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .counter-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .counter-row { display: flex; align-items: center; background-color: #2a2a2a; border-radius: 8px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; border-left: 8px solid #71717a; transition: all 0.2s ease; }
        .counter-container.is-collapsed .counter-row { padding: 6px 10px; }
        .color-purple { border-left-color: #a855f7; }
        .color-red { border-left-color: #ef4444; }
        .color-green { border-left-color: #22c55e; }
        .color-orange { border-left-color: #f97316; }
        .color-blue { border-left-color: #3b82f6; }
        .color-yellow { border-left-color: #eab308; }
        .name-probability-zone { display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; }
        .counter-container.is-collapsed .name-probability-zone { flex-direction: row; gap: 15px; flex: 1; justify-content: flex-start; padding-left: 10px; }
        .name-input { width: 80px; font-weight: bold; font-size: 0.9rem; text-align: center; padding: 6px 4px; border-radius: 4px; border: 1px dashed #555; background-color: #333; color: #fff; }
        .name-input:focus { outline: none; border: 1px solid #00ffcc; background-color: #444; }
        .probability-display { font-size: 0.8rem; color: #aaa; font-weight: bold; background-color: #1a1a1a; padding: 2px 6px; border-radius: 4px; }
        .counter-container.is-collapsed .probability-display { font-size: 1.2rem; color: #00ffcc; background-color: transparent; padding: 0; }
        .count-input { flex: 1; width: 100%; font-size: 2.4rem; font-weight: bold; text-align: center; font-family: monospace; color: #00ffcc; background: transparent; border: none; padding: 0; }
        .count-input:focus { outline: none; background-color: #333; border-radius: 4px; }
        .count-input::placeholder { color: #444; }
        .counter-container.is-collapsed .count-input, .counter-container.is-collapsed .btn-action, .counter-container.is-collapsed .btn-delete { display: none !important; }
        .btn-action { width: 65px; height: 50px; font-size: 1.6rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: #ffffff; margin-left: 8px; }
        .btn-plus { background-color: #0288d1; }
        .btn-plus:active { background-color: #03a9f4; }
        .btn-minus { background-color: #c62828; font-size: 1.8rem; }
        .btn-minus:active { background-color: #e53935; }
        .btn-delete { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; border-radius: 50%; background-color: #555; color: #fff; border: none; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .add-container { width: 100%; max-width: 450px; display: flex; justify-content: center; margin-bottom: 20px; }
        .is-collapsed + .add-container { display: none; }
        .btn-add { width: 100%; padding: 12px; font-size: 0.9rem; font-weight: bold; background-color: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .memo-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 6px; box-sizing: border-box; flex: 1; }
        .memo-label { font-size: 0.9rem; color: #aaa; font-weight: bold; padding-left: 4px; }
        .memo-textarea { width: 100%; height: 150px; background-color: #222; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 0.95rem; resize: vertical; }
        .memo-textarea:focus { outline: none; border-color: #00ffcc; }
    </style>
</head>
